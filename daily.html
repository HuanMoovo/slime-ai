<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI Radar 日报 — 每日 AI 动态分类汇总">
  <title>AI 日报 · AI Radar</title>
  <link rel="icon" href="images/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* Daily page specific styles */
    .daily-layout { display: grid; grid-template-columns: 240px 1fr; gap: 1.5rem; max-width: 1200px; margin: 1.5rem auto 3rem; padding: 0 1.5rem; position: relative; z-index: 1; }
    
    /* Sidebar */
    .daily-sidebar { position: sticky; top: calc(var(--header-h) + 1.5rem); align-self: start; }
    .sidebar-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 1rem; margin-bottom: 1rem; }
    [data-theme="light"] .sidebar-card { background: rgba(255,255,255,0.7); border: 1px solid rgba(0,0,0,0.06); }
    .sidebar-card h3 { font-size: .8rem; font-weight: 600; margin-bottom: .75rem; color: var(--accent); letter-spacing: .05em; }
    .sidebar-date { display: block; padding: 5px 10px; border-radius: 8px; font-size: .78rem; color: var(--text2); cursor: pointer; transition: all .2s; margin-bottom: 1px; }
    .sidebar-date:hover { background: rgba(139,92,246,0.08); color: var(--text); }
    .sidebar-date.active { background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff; }
    .sidebar-date .date-num { font-weight: 600; margin-right: 4px; }
    .sidebar-date .date-count { font-size: .65rem; color: var(--text3); float: right; }
    
    .sidebar-month { font-size: .72rem; color: var(--text3); padding: 8px 10px 4px; font-weight: 600; letter-spacing: .05em; }
    
    /* Daily Header */
    .daily-header { position: relative; z-index: 1; margin-top: var(--header-h); padding: 2.5rem 1.5rem; background: linear-gradient(180deg, rgba(139,92,246,0.06) 0%, transparent 100%); border-bottom: 1px solid rgba(255,255,255,0.04); }
    .daily-header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
    .daily-vol { font-size: .7rem; color: var(--accent); font-weight: 600; letter-spacing: .1em; }
    .daily-date { font-size: 1.6rem; font-weight: 800; letter-spacing: -.02em; background: linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .daily-stories { font-size: .75rem; color: var(--text3); }
    .daily-desc { font-size: .78rem; color: var(--text3); }
    .daily-nav-links { display: flex; gap: .5rem; margin-left: auto; }
    .daily-nav-btn { background: var(--card); border: 1px solid var(--card-border); color: var(--text2); padding: 5px 14px; border-radius: 20px; font-size: .78rem; cursor: pointer; transition: all .3s; font-family: var(--font); }
    .daily-nav-btn:hover { background: var(--card-hover); color: var(--accent); border-color: var(--accent); }
    
    /* Daily Sections */
    .daily-content { min-width: 0; }
    .daily-section { margin-bottom: 2rem; }
    .daily-section-header { display: flex; align-items: baseline; gap: .75rem; padding: .6rem 0; margin-bottom: .5rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
    [data-theme="light"] .daily-section-header { border-bottom: 1px solid rgba(0,0,0,0.04); }
    .daily-section-num { font-size: 1.1rem; font-weight: 800; color: var(--accent); font-family: 'Inter', monospace; opacity: 0.5; }
    .daily-section h2 { font-size: .95rem; font-weight: 600; }
    .daily-section-en { font-size: .65rem; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-left: auto; }
    
    /* Daily Article */
    .daily-article { padding: .7rem 0; border-bottom: 1px solid rgba(255,255,255,0.03); transition: all .2s; cursor: pointer; }
    .daily-article:last-child { border-bottom: none; }
    .daily-article:hover { padding-left: 8px; }
    [data-theme="light"] .daily-article { border-bottom: 1px solid rgba(0,0,0,0.03); }
    .daily-article h3 { font-size: .85rem; font-weight: 600; line-height: 1.5; margin-bottom: 4px; transition: color .15s; }
    .daily-article:hover h3 { color: var(--accent); }
    .daily-article-meta { display: flex; gap: 8px; font-size: .68rem; color: var(--text3); }
    .daily-article-source { background: var(--card); padding: 0 6px; border-radius: 3px; }
    
    @media (max-width: 768px) { .daily-layout { grid-template-columns: 1fr; } .daily-sidebar { display: none; } }
  </style>
</head>
<body>
  <canvas id="particleCanvas"></canvas>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">

        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="zh">繁</button>
          <button class="lang-btn" data-lang="ja">日</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <button class="theme-toggle" id="themeToggle">🌓</button>
        <button class="nav-toggle" id="navToggle">☰</button>
      </div>
    </div>
  </header>

  <!-- Daily Header -->
  <div class="daily-header">
    <div class="daily-header-inner">
      <div>
        <div class="daily-vol">AI RADAR DAILY</div>
        <div class="daily-date" id="dailyDate">2026.06.23</div>
        <div class="daily-stories" id="dailyStories">17 STORIES · 每早八时</div>
      </div>
      <div class="daily-nav-links">
        <button class="daily-nav-btn" id="prevDay">‹ 前一天</button>
        <button class="daily-nav-btn" id="nextDay">后一天 ›</button>
        <button class="daily-nav-btn" id="gotoToday">📅 今天</button>
      </div>
    </div>
  </div>

  <!-- Daily Layout -->
  <div class="daily-layout">
    <!-- Sidebar -->
    <aside class="daily-sidebar" id="dailySidebar">
      <div class="sidebar-card">
        <h3>📅 日报历史</h3>
        <div id="dateList"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="daily-content" id="dailyContent">
      <!-- Injected by JS -->
    </main>
  </div>

  <div class="glow-line"></div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-section">
        <h4>📡 AI Radar</h4>
        <p>AI 前沿动态聚合平台 · 每日精选 · 多信源追踪</p>
      </div>
      <div class="footer-section">
        <h4>导航</h4>
        <ul>
          <li><a href="index.html">精选</a></li>
          <li><a href="trending.html">热门</a></li>
          <li><a href="daily.html">AI 日报</a></li>
          <li><a href="about.html">关于</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom"><span>&copy; 2026 AI Radar</span></div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script>
    // Initialize particle canvas
    const canvas = document.getElementById('particleCanvas');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      let w, h, particles = [];
      function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
      resize(); window.addEventListener('resize', resize);
      class P { constructor() { this.reset(); } reset() { this.x = Math.random()*w; this.y = Math.random()*h; this.vx = (Math.random()-0.5)*0.3; this.vy = (Math.random()-0.5)*0.3; this.r = Math.random()*2+0.5; this.a = Math.random()*0.3+0.05; this.p = Math.random()*Math.PI*2; } update() { this.x+=this.vx; this.y+=this.vy; this.p+=0.02; if(this.x<0||this.x>w)this.vx*=-1; if(this.y<0||this.y>h)this.vy*=-1; } draw() { ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle=`rgba(139,92,246,${this.a*(0.6+0.4*Math.sin(this.p))})`; ctx.fill(); } }
      for(let i=0;i<50;i++) particles.push(new P());
      function drawLines() { for(let i=0;i<particles.length;i++) for(let j=i+1;j<particles.length;j++) { let dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y, d=Math.sqrt(dx*dx+dy*dy); if(d<150) { ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.strokeStyle=`rgba(139,92,246,${(1-d/150)*0.05})`; ctx.lineWidth=0.5; ctx.stroke(); } } }
      function animate() { ctx.clearRect(0,0,w,h); particles.forEach(p=>{p.update();p.draw()}); drawLines(); requestAnimationFrame(animate); }
      animate();
    }

    // Build daily view from NEWS_DATA
    let currentDailyDate = 'all';

    function getDailyData(date) {
      const dayData = NEWS_DATA.find(d => d.day === date);
      if (!dayData) return null;
      
      // Classify items into sections
      const sections = {
        model: { title: { zh: '模型发布/更新', ja: 'モデル発表', en: 'Model Releases' }, items: [] },
        product: { title: { zh: '产品发布/更新', ja: 'プロダクト', en: 'Products' }, items: [] },
        industry: { title: { zh: '行业动态', ja: '業界動向', en: 'Industry' }, items: [] },
        paper: { title: { zh: '论文研究', ja: '論文研究', en: 'Research Papers' }, items: [] },
        tutorial: { title: { zh: '教程与观点', ja: 'チュートリアル', en: 'Tutorials' }, items: [] },
        other: { title: { zh: '其他动态', ja: 'その他', en: 'Others' }, items: [] },
      };
      
      dayData.items.forEach(item => {
        let placed = false;
        for (const tag of item.tags) {
          if (sections[tag]) { sections[tag].items.push(item); placed = true; break; }
        }
        if (!placed) sections.other.items.push(item);
      });
      
      return sections;
    }

    function renderDaily(date) {
      currentDailyDate = date;
      const sections = getDailyData(date);
      if (!sections) { document.getElementById('dailyContent').innerHTML = '<div style="text-align:center;padding:4rem;color:var(--text3)">暂无该日数据</div>'; return; }

      const lang = currentLang || 'zh';
      const enSections = { model: 'MODEL', product: 'PRODUCT', industry: 'INDUSTRY', paper: 'RESEARCH', tutorial: 'TIPS', other: 'OTHER' };
      const order = ['model','product','industry','paper','tutorial','other'];
      
      let html = '';
      let num = 1;
      order.forEach(key => {
        const sec = sections[key];
        if (!sec.items.length) return;
        const title = sec.title[lang] || sec.title.zh;
        html += `<div class="daily-section">
          <div class="daily-section-header">
            <span class="daily-section-num">${String(num).padStart(2,'0')}</span>
            <h2>${title}</h2>
            <span class="daily-section-en">${enSections[key]}</span>
          </div>`;
        sec.items.forEach(item => {
          const c = item[lang] || item.zh;
          html += `<div class="daily-article" onclick="window.open('${item.url}','_blank')">
            <h3>${c.title}</h3>
            <div class="daily-article-meta">
              <span class="daily-article-source">${item.source}</span>
              <span>${item.time}</span>
            </div>
          </div>`;
        });
        html += `</div>`;
        num++;
      });

      document.getElementById('dailyContent').innerHTML = html;
      
      // Update header
      const dl = document.getElementById('dailyDate');
      const ds = document.getElementById('dailyStories');
      if (dl) dl.textContent = date;
      if (ds) {
        const total = Object.values(sections).reduce((s,sec) => s + sec.items.length, 0);
        ds.textContent = `${total} STORIES · 每早八时`;
      }
      
      // Update sidebar
      renderDateSidebar(date);
    }

    function renderDateSidebar(activeDate) {
      const container = document.getElementById('dateList');
      if (!container) return;
      
      const dates = [...new Set(NEWS_DATA.map(d => d.day))].sort((a,b) => b.localeCompare(a));
      const months = {};
      dates.forEach(d => {
        const m = d.substring(0, 7);
        if (!months[m]) months[m] = [];
        months[m].push(d);
      });

      let html = '';
      Object.entries(months).forEach(([month, days]) => {
        html += `<div class="sidebar-month">${month}</div>`;
        days.forEach(d => {
          const dayData = NEWS_DATA.find(dd => dd.day === d);
          const count = dayData ? dayData.items.length : 0;
          const dayNum = parseInt(d.split('-')[2]);
          html += `<div class="sidebar-date ${d === activeDate ? 'active' : ''}" onclick="renderDaily('${d}')">
            <span class="date-num">${dayNum}日</span>
            <span class="date-count">${count}</span>
          </div>`;
        });
      });
      container.innerHTML = html;
    }

    // Date navigation
    document.addEventListener('DOMContentLoaded', () => {
      const dates = [...new Set(NEWS_DATA.map(d => d.day))].sort((a,b) => b.localeCompare(a));
      if (dates.length) renderDaily(dates[0]);

      document.getElementById('prevDay')?.addEventListener('click', () => {
        const dates = [...new Set(NEWS_DATA.map(d => d.day))].sort((a,b) => b.localeCompare(a));
        const idx = dates.indexOf(currentDailyDate);
        if (idx < dates.length - 1) renderDaily(dates[idx + 1]);
      });
      document.getElementById('nextDay')?.addEventListener('click', () => {
        const dates = [...new Set(NEWS_DATA.map(d => d.day))].sort((a,b) => b.localeCompare(a));
        const idx = dates.indexOf(currentDailyDate);
        if (idx > 0) renderDaily(dates[idx - 1]);
      });
      document.getElementById('gotoToday')?.addEventListener('click', () => {
        if (dates.length) renderDaily(dates[0]);
      });
    });
  </script>
</body>
</html>
