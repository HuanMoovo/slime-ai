<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgRadar" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0f0ff"/>
      <stop offset="100%" stop-color="#e4e4f0"/>
    </radialGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgRadar)" stroke="#d4d4e0" stroke-width="2"/>

  <!-- Concentric rings -->
  <circle cx="100" cy="100" r="20" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.25"/>
  <circle cx="100" cy="100" r="40" fill="none" stroke="#7c3aed" stroke-width="1.2" opacity="0.2"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.15"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.1"/>

  <!-- Crosshair lines -->
  <line x1="5" y1="100" x2="195" y2="100" stroke="#d4d4e0" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="5" x2="100" y2="195" stroke="#d4d4e0" stroke-width="1" opacity="0.5"/>

  <!-- Scan arc -->
  <path d="M100 100 L175 50 A85 85 0 0 1 175 150 Z" fill="#f59e0b" opacity="0.05"/>
  <path d="M100 100 L170 55 A75 75 0 0 1 170 145 Z" fill="#f59e0b" opacity="0.03"/>

  <!-- Scan line -->
  <line x1="100" y1="100" x2="175" y2="50" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="8" fill="#ef4444"/>
  <circle cx="100" cy="100" r="4" fill="#ffffff" opacity="0.95"/>
  <circle cx="98" cy="98" r="2" fill="#ffffff" opacity="0.5"/>

  <!-- Radar blips -->
  <circle cx="145" cy="65" r="5" fill="#7c3aed" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="55" r="3.5" fill="#f59e0b" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="135" cy="140" r="4" fill="#ef4444" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="55" cy="130" r="3" fill="#7c3aed" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.05;0.35" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="150" r="2.5" fill="#f59e0b" opacity="0.3"/>
  <circle cx="160" cy="100" r="3" fill="#7c3aed" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.05;0.35" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Tick marks -->
  <g stroke="#7c3aed" stroke-width="1.5" opacity="0.25">
    <line x1="5" y1="100" x2="15" y2="100"/>
    <line x1="185" y1="100" x2="195" y2="100"/>
    <line x1="100" y1="5" x2="100" y2="15"/>
    <line x1="100" y1="185" x2="100" y2="195"/>
    <line x1="33" y1="33" x2="40" y2="40"/>
    <line x1="167" y1="33" x2="160" y2="40"/>
    <line x1="33" y1="167" x2="40" y2="160"/>
    <line x1="167" y1="167" x2="160" y2="160"/>
  </g>
</svg>
