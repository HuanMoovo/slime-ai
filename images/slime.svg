<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bodyG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="35%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bodyShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="175" rx="48" ry="8" fill="#1a1a2e" opacity="0.1"/>

  <!-- Body - dome shape -->
  <path d="M100 30 C60 30 30 50 28 80 C26 110 35 135 48 150 C58 161 72 168 86 172 C93 174 97 175 100 175 C103 175 107 174 114 172 C128 168 142 161 152 150 C165 135 174 110 172 80 C170 50 140 30 100 30Z" fill="url(#bodyG)"/>

  <!-- Body shine -->
  <ellipse cx="85" cy="55" rx="35" ry="20" fill="url(#bodyShine)"/>

  <!-- Left eye - big round -->
  <ellipse cx="72" cy="88" rx="18" ry="20" fill="#1a1a2e"/>
  <ellipse cx="72" cy="88" rx="15" ry="17" fill="#ffffff"/>
  <ellipse cx="72" cy="88" rx="10" ry="12" fill="#7c3aed"/>
  <ellipse cx="70" cy="85" rx="7" ry="9" fill="#a78bfa"/>
  <ellipse cx="65" cy="79" rx="4" ry="5" fill="#ffffff" opacity="0.95"/>
  <circle cx="78" cy="95" r="2.5" fill="#ffffff" opacity="0.5"/>

  <!-- Right eye -->
  <ellipse cx="128" cy="88" rx="18" ry="20" fill="#1a1a2e"/>
  <ellipse cx="128" cy="88" rx="15" ry="17" fill="#ffffff"/>
  <ellipse cx="128" cy="88" rx="10" ry="12" fill="#7c3aed"/>
  <ellipse cx="126" cy="85" rx="7" ry="9" fill="#a78bfa"/>
  <ellipse cx="121" cy="79" rx="4" ry="5" fill="#ffffff" opacity="0.95"/>
  <circle cx="134" cy="95" r="2.5" fill="#ffffff" opacity="0.5"/>

  <!-- Blush -->
  <ellipse cx="48" cy="115" rx="12" ry="7" fill="#f472b6" opacity="0.2"/>
  <ellipse cx="152" cy="115" rx="12" ry="7" fill="#f472b6" opacity="0.2"/>

  <!-- Mouth -->
  <path d="M88 115 Q93 122 100 124 Q107 122 112 115" fill="none" stroke="#5b21b6" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="100" cy="121" rx="4" ry="2" fill="#5b21b6" opacity="0.1"/>

  <!-- Arms -->
  <path d="M26 115 Q12 108 10 120 Q8 130 16 126" fill="none" stroke="#8b5cf6" stroke-width="5" stroke-linecap="round"/>
  <path d="M174 115 Q188 108 190 120 Q192 130 184 126" fill="none" stroke="#8b5cf6" stroke-width="5" stroke-linecap="round"/>

  <!-- Feet -->
  <ellipse cx="72" cy="174" rx="14" ry="5" fill="#7c3aed"/>
  <ellipse cx="128" cy="174" rx="14" ry="5" fill="#7c3aed"/>

  <!-- Drip -->
  <ellipse cx="48" cy="160" rx="4" ry="6" fill="#a78bfa" opacity="0.6"/>
  <ellipse cx="152" cy="158" rx="3" ry="5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="100" cy="178" r="2.5" fill="#a78bfa" opacity="0.3"/>

  <!-- Sparkles -->
  <g fill="#c4b5fd" opacity="0.7">
    <circle cx="30" cy="42" r="2.5"/>
    <circle cx="170" cy="40" r="2.5"/>
    <circle cx="100" cy="28" r="2"/>
    <circle cx="145" cy="35" r="1.5"/>
    <circle cx="55" cy="33" r="1.5"/>
  </g>
</svg>
