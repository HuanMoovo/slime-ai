<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="sg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="60" cy="105" rx="30" ry="5" fill="#1a1a2e" opacity="0.15"/>

  <!-- Body - geometric slime blob -->
  <path d="M60 18 
           C45 18 32 28 28 42 
           C24 56 25 70 30 80 
           C33 86 38 90 44 93 
           C50 96 55 97 60 97 
           C65 97 70 96 76 93 
           C82 90 87 86 90 80 
           C95 70 96 56 92 42 
           C88 28 75 18 60 18Z" 
        fill="url(#sg)"/>

  <!-- Body highlight top -->
  <ellipse cx="60" cy="30" rx="22" ry="10" fill="url(#sg2)"/>

  <!-- Drip drops -->
  <ellipse cx="38" cy="92" rx="3" ry="5" fill="#7c3aed"/>
  <ellipse cx="82" cy="90" rx="2.5" ry="4" fill="#7c3aed"/>
  <circle cx="60" cy="100" r="2" fill="#7c3aed" opacity="0.5"/>

  <!-- Left eye - circle -->
  <circle cx="48" cy="56" r="10" fill="#1a1a2e"/>
  <circle cx="48" cy="56" r="8" fill="#f0f0ff"/>
  <circle cx="48" cy="56" r="5" fill="#8b5cf6"/>
  <circle cx="46" cy="54" r="3.5" fill="#c4b5fd"/>
  <circle cx="44" cy="52" r="2" fill="#ffffff" opacity="0.9"/>

  <!-- Right eye - circle -->
  <circle cx="72" cy="56" r="10" fill="#1a1a2e"/>
  <circle cx="72" cy="56" r="8" fill="#f0f0ff"/>
  <circle cx="72" cy="56" r="5" fill="#8b5cf6"/>
  <circle cx="70" cy="54" r="3.5" fill="#c4b5fd"/>
  <circle cx="68" cy="52" r="2" fill="#ffffff" opacity="0.9"/>

  <!-- Blush - circles -->
  <circle cx="38" cy="68" r="4" fill="#ec4899" opacity="0.2"/>
  <circle cx="82" cy="68" r="4" fill="#ec4899" opacity="0.2"/>

  <!-- Mouth - gentle arc -->
  <path d="M54 72 Q60 78 66 72" fill="none" stroke="#5b21b6" stroke-width="2" stroke-linecap="round"/>

  <!-- Sparkles -->
  <circle cx="28" cy="32" r="1.5" fill="#ddd6fe" opacity="0.6"/>
  <circle cx="92" cy="30" r="1.5" fill="#ddd6fe" opacity="0.6"/>
  <circle cx="60" cy="22" r="1" fill="#ede9fe" opacity="0.4"/>
</svg>
