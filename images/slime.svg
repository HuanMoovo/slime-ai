<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bodyGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="40%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="eyeShine" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#e0e0ff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </radialGradient>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="100" cy="172" rx="52" ry="10" fill="#1a1a2e" opacity="0.08"/>

  <!-- Main body - big round squishy blob -->
  <path d="M100 25 
           C60 25 30 50 28 80 
           C26 105 32 125 42 140 
           C50 151 62 158 76 163 
           C86 166 93 167 100 167 
           C107 167 114 166 124 163 
           C138 158 150 151 158 140 
           C168 125 174 105 172 80 
           C170 50 140 25 100 25Z" 
        fill="url(#bodyGrad)"/>

  <!-- Body highlight -->
  <ellipse cx="85" cy="55" rx="35" ry="18" fill="#ddd6fe" opacity="0.3"/>

  <!-- Left eye - BIG anime style -->
  <ellipse cx="72" cy="85" rx="20" ry="22" fill="#1a1a2e"/>
  <ellipse cx="72" cy="85" rx="17" ry="19" fill="url(#eyeShine)"/>
  <ellipse cx="72" cy="85" rx="11" ry="13" fill="#8b5cf6"/>
  <ellipse cx="70" cy="82" rx="8" ry="10" fill="#a78bfa"/>
  <!-- Sparkle highlights -->
  <ellipse cx="64" cy="76" rx="5" ry="6" fill="#ffffff" opacity="0.95"/>
  <circle cx="78" cy="92" r="2.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="68" cy="90" r="1.5" fill="#1a1a2e" opacity="0.15"/>

  <!-- Right eye - BIG anime style -->
  <ellipse cx="128" cy="85" rx="20" ry="22" fill="#1a1a2e"/>
  <ellipse cx="128" cy="85" rx="17" ry="19" fill="url(#eyeShine)"/>
  <ellipse cx="128" cy="85" rx="11" ry="13" fill="#8b5cf6"/>
  <ellipse cx="126" cy="82" rx="8" ry="10" fill="#a78bfa"/>
  <!-- Sparkle highlights -->
  <ellipse cx="120" cy="76" rx="5" ry="6" fill="#ffffff" opacity="0.95"/>
  <circle cx="134" cy="92" r="2.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="124" cy="90" r="1.5" fill="#1a1a2e" opacity="0.15"/>

  <!-- Blush - cute pink circles -->
  <ellipse cx="50" cy="110" rx="12" ry="7" fill="#f472b6" opacity="0.25"/>
  <ellipse cx="150" cy="110" rx="12" ry="7" fill="#f472b6" opacity="0.25"/>

  <!-- Mouth - super cute tiny smile -->
  <path d="M88 112 Q95 122 100 124 Q105 122 112 112" 
        fill="none" stroke="#5b21b6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tiny open mouth hint -->
  <ellipse cx="100" cy="120" rx="5" ry="3" fill="#5b21b6" opacity="0.15"/>

  <!-- Small arms -->
  <path d="M28 110 Q15 105 12 115 Q10 122 16 120" fill="none" stroke="#8b5cf6" stroke-width="5" stroke-linecap="round"/>
  <path d="M172 110 Q185 105 188 115 Q190 122 184 120" fill="none" stroke="#8b5cf6" stroke-width="5" stroke-linecap="round"/>

  <!-- Feet nubbins -->
  <ellipse cx="70" cy="166" rx="16" ry="6" fill="#7c3aed"/>
  <ellipse cx="130" cy="166" rx="16" ry="6" fill="#7c3aed"/>

  <!-- Drip drops -->
  <ellipse cx="50" cy="155" rx="4" ry="6" fill="#a78bfa" opacity="0.7"/>
  <ellipse cx="150" cy="153" rx="3" ry="5" fill="#a78bfa" opacity="0.7"/>
  <circle cx="100" cy="170" r="3" fill="#a78bfa" opacity="0.4"/>

  <!-- Sparkles around the slime -->
  <g fill="#c4b5fd" opacity="0.7">
    <path d="M25 45 L27 40 L29 45 L34 47 L29 49 L27 54 L25 49 L20 47Z" transform="scale(0.6) translate(10,20)"/>
    <path d="M170 40 L172 35 L174 40 L179 42 L174 44 L172 49 L170 44 L165 42Z" transform="scale(0.5) translate(80,30)"/>
    <circle cx="42" cy="38" r="2"/>
    <circle cx="158" cy="36" r="2"/>
    <circle cx="100" cy="28" r="2.5"/>
  </g>
</svg>
