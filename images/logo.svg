<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgRadar" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#050d1a"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowCenter" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur3"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle with glow -->
  <circle cx="100" cy="100" r="95" fill="url(#bgRadar)" stroke="#8b5cf6" stroke-width="2" filter="url(#glowSoft)" opacity="0.6"/>
  <circle cx="100" cy="100" r="95" fill="url(#bgRadar)" stroke="#8b5cf6" stroke-width="1.5" opacity="0.8"/>

  <!-- Concentric rings -->
  <circle cx="100" cy="100" r="20" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.25"/>
  <circle cx="100" cy="100" r="40" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.2"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.15"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#22d3ee" stroke-width="0.8" opacity="0.1"/>

  <!-- Crosshair -->
  <line x1="5" y1="100" x2="195" y2="100" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="5" x2="100" y2="195" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>

  <!-- Scan arc with glow -->
  <path d="M100 100 L175 50 A85 85 0 0 1 175 150 Z" fill="#fbbf24" opacity="0.04"/>
  <path d="M100 100 L170 55 A75 75 0 0 1 170 145 Z" fill="#fbbf24" opacity="0.03"/>

  <!-- Scan line with glow -->
  <g filter="url(#glow)">
    <line x1="100" y1="100" x2="175" y2="50" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="3s" repeatCount="indefinite"/>
    </line>
  </g>
  <line x1="100" y1="100" x2="175" y2="50" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Center dot with glow -->
  <g filter="url(#glowCenter)">
    <circle cx="100" cy="100" r="10" fill="#ef4444" opacity="0.7"/>
  </g>
  <circle cx="100" cy="100" r="8" fill="#ef4444"/>
  <circle cx="100" cy="100" r="4" fill="#ffffff" opacity="0.95"/>
  <circle cx="98" cy="98" r="2" fill="#ffffff" opacity="0.5"/>

  <!-- Radar blips with glow -->
  <g filter="url(#glow)">
    <circle cx="145" cy="65" r="6" fill="#22d3ee" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.05;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <circle cx="145" cy="65" r="4" fill="#22d3ee" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <g filter="url(#glow)">
    <circle cx="60" cy="55" r="4.5" fill="#fbbf24" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.05;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <circle cx="60" cy="55" r="3" fill="#fbbf24" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <g filter="url(#glow)">
    <circle cx="135" cy="140" r="5" fill="#ef4444" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.05;0.35" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <circle cx="135" cy="140" r="3.5" fill="#ef4444" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.15;0.7" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="55" cy="130" r="2.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="80" cy="150" r="2" fill="#fbbf24" opacity="0.4"/>
  <circle cx="160" cy="100" r="2.5" fill="#22d3ee" opacity="0.5"/>

  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3" filter="url(#glowSoft)"/>

  <!-- Tick marks -->
  <g stroke="#8b5cf6" stroke-width="1.5" opacity="0.35">
    <line x1="5" y1="100" x2="15" y2="100"/>
    <line x1="185" y1="100" x2="195" y2="100"/>
    <line x1="100" y1="5" x2="100" y2="15"/>
    <line x1="100" y1="185" x2="100" y2="195"/>
    <line x1="33" y1="33" x2="40" y2="40"/>
    <line x1="167" y1="33" x2="160" y2="40"/>
    <line x1="33" y1="167" x2="40" y2="160"/>
    <line x1="167" y1="167" x2="160" y2="160"/>
  </g>
</svg>
